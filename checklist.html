<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curriculum Checklist Tracker</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="checklist.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">Checklist Mode</p>
      <h1>Topics and Subtopics Tracker</h1>
      <p class="subtitle">Tick each subtopic as you complete it. Track section progress and overall completion.</p>
      <div class="hero-actions">
        <a class="btn" href="index.html">Back To Curriculum</a>
        <button id="resetChecks" class="btn btn-ghost">Reset All Checks</button>
      </div>
    </div>
  </header>

  <main class="layout-single">
    <section class="card checklist-summary">
      <h2>Progress Overview</h2>
      <p><strong id="overallPct">0%</strong> overall complete</p>
      <div class="progress-bar"><div id="overallBar"></div></div>
    </section>

    <section id="sections" class="checklist-sections"></section>
  </main>

  <script src="checklist.js"></script>
</body>
</html>
