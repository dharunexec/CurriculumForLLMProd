<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning LLMs Checklist</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="checklist.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">Learning LLMs</p>
      <h1>LLM Curriculum Checklist</h1>
      <p class="subtitle">Module-wise learning tracker with topic/subtopic checkboxes, section completion, and overall progress.</p>
      <div class="hero-actions">
        <a class="btn" href="index.html">Back To Curriculum</a>
        <button id="resetChecks" class="btn btn-ghost">Reset LLM Checks</button>
      </div>
    </div>
  </header>

  <main class="layout-single">
    <section class="card checklist-summary">
      <h2>Progress Overview</h2>
      <p class="small"><strong>Build:</strong> <span id="buildVersion">loading...</span></p>
      <p><strong id="overallPct">0%</strong> overall complete</p>
      <div class="progress-bar"><div id="overallBar"></div></div>
    </section>

    <section id="sections" class="checklist-sections"></section>
  </main>

  <script src="learning-llms.js"></script>
</body>
</html>
